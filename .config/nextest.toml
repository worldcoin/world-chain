experimental = ["setup-scripts"]

[test-groups.unit]
max-threads = "num-cpus"

[test-groups.integration]
max-threads = "num-cpus"

[[profile.default.overrides]]
filter = 'not package(world-chain-tests)'
test-group = 'unit'

[[profile.default.overrides]]
filter = 'package(world-chain-tests)'
test-group = 'integration'

[profile.default]
failure-output = "immediate-final"
success-output = "never"

[profile.default.junit]
path = "target/nextest/junit.xml"
store-failure-output = true
store-success-output = false

[profile.ci]
fail-fast = false
failure-output = "immediate-final"

[profile.ci.junit]
path = "junit.xml"
store-failure-output = true
store-success-output = false

[scripts.setup.tracing-dev]
command = 'bash -c "echo RUST_LOG=$DEBUG >> $NEXTEST_ENV"'

[scripts.setup.tracing-verbose]
command = 'bash -c "echo RUST_LOG=$TRACE >> $NEXTEST_ENV"'

[[profile.dev-tracing.scripts]]
filter = 'all()'
setup = 'tracing-dev'

[[profile.verbose-tracing.scripts]]
filter = 'all()'
setup = 'tracing-verbose'
