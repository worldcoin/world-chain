[profile.default]
solc = "0.8.28"
evm_version = 'cancun'
libs = ["lib"]
out = "out"
src = "src"
optimizer = true
optimizer_runs = 200
bytecode_hash = "none"
cbor_metadata = false
fs_permissions = [{access = "read-write", path = "./"}]

remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
  "@account-abstraction/contracts/=lib/account-abstraction/contracts/",
  "@world-id-contracts/=lib/world-id-contracts/src/",
  "@BokkyPooBahsDateTimeLibrary/=lib/BokkyPooBahsDateTimeLibrary/contracts/",
  "@pbh-lib/=src/libraries/",
  "openzeppelin-contracts/=lib/world-id-contracts/lib/openzeppelin-contracts/contracts/",
  "@4337=lib/safe-modules/modules/4337/contracts/",
  "@safe-global/safe-contracts/contracts/=lib/safe-contracts/contracts/",
  "@base-contracts/=vendor/base-contracts/",
  "base-contracts/=vendor/base-contracts/",
  "@forge-std/=lib/forge-std/src/",
  "forge-std/=lib/forge-std/src/",
  "@solady=lib/solady/src/utils/",
  "@sp1-contracts/=lib/sp1-contracts/contracts/",
]

# Note: the vendored SP1 Groth16 verifier (lib/sp1-contracts/.../v6.1.0) hard-pins solc
# 0.8.20 (pre-cancun). It is intentionally NOT imported by any src/script/test file, so it
# is never part of this project's 0.8.28 build. It is deployed standalone via `forge create
# --use 0.8.20 --evm-version shanghai` (see crates/devnet deploy_world_proof_system), and the
# proof-system deploy receives the deployed address through SP1_VERIFIER_ADDRESS.

[profile.ci]

[fuzz]
max_test_rejects = 150000
runs = 100

[fmt]
ignore = ["lib"]
