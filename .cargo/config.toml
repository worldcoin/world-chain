[alias]
xtask = "run --package xtask --"
docs = "doc --workspace --all-features --no-deps"
b = "bench --workspace --all-targets"
bs = "bench --package world-chain-validator --bench flashblock_validation_synthetic -- --save-baseline"
bc = "bench --package world-chain-validator --bench flashblock_validation_synthetic -- --baseline main --save-baseline pr"
bb = "bench --package world-chain-builder --bench flashblock_building_live_node --"
bv = "bench --package world-chain-validator --bench flashblock_validation_synthetic --"
bvl = "bench --package world-chain-validator --bench flashblock_validation_live_node --"

[env]
DEBUG = "info,flashblocks=debug,world_chain=info"
TRACE = "info,flashblocks=trace,world_chain=trace,engine::tree=trace"
DEFENDER_LOG = "warn,world_chain_tests=info,world_chain_defender=trace,world_chain_challenger=trace,world_chain_prover_service=trace,world_chain_sp1_worker=trace,world_chain_proof_worker=debug,world_chain_proof_succinct_host_utils=info,world_chain_devnet=info,op_batcher=error"
PROVING_LOG = "warn,world_chain_tests=info,world_chain_defender=trace,world_chain_challenger=trace,world_chain_prover_service=trace,world_chain_sp1_worker=trace,world_chain_proof_worker=trace,world_chain_proof_succinct_host_utils=trace,world_chain_proof_succinct_aggregation=trace,op_batcher=error,sp1_core_executor=trace,sp1_core_machine=trace,sp1_prover=trace,sp1_sdk=trace,sp1_recursion_machine=trace,sp1_recursion_circuit=trace,sp1_recursion_compiler=trace,sp1_recursion_executor=trace,sp1_recursion_gnark_ffi=trace,sp1_hypercube=trace,sp1_curves=trace"

RUSTFLAGS="-W unused-crate-dependencies"
RUST_BACKTRACE = { value = "full", force = false }
