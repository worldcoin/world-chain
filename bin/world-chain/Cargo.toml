[package]
name = "world-chain"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
# world-chain
world-chain-cli.workspace = true
world-chain-chainspec.workspace = true
world-chain-evm.workspace = true
world-chain-node.workspace = true
world-chain-rpc.workspace = true
world-chain-kona.workspace = true

# reth
reth-cli-util.workspace = true
reth-node-builder.workspace = true
reth-tracing.workspace = true
reth-payload-builder.workspace = true

# op-reth
reth-optimism-consensus.workspace = true

reth-provider.workspace = true

# kona consensus node (in-process)
kona-genesis.workspace = true

# alloy
alloy-provider = { workspace = true, features = ["reqwest"] }
alloy-rpc-types-engine = { workspace = true, features = ["jwt"] }
op-alloy-network.workspace = true

# misc
dotenvy.workspace = true
clap.workspace = true
eyre.workspace = true
tokio.workspace = true
serde_json.workspace = true
url.workspace = true

# optional
tikv-jemallocator = { workspace = true, optional = true }

[features]
default = ["jemalloc"]

jemalloc = ["tikv-jemallocator"]
