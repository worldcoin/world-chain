[package]
name = "proof"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[[bin]]
name = "proof"
path = "src/main.rs"

[dependencies]
alloy-primitives.workspace = true
clap.workspace = true
color-eyre = "0.6"
dotenvy.workspace = true
hex.workspace = true
kona-host = { workspace = true, features = ["single"] }
kona-preimage.workspace = true
kona-proof.workspace = true
reqwest = { workspace = true, features = ["blocking", "json", "rustls-tls"] }
rkyv.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
world-chain-chainspec.workspace = true
world-chain-proof-core.workspace = true
world-chain-proof-protocol.workspace = true
world-chain-proof-succinct-client-utils.workspace = true
world-chain-proof-succinct-ethereum-client-utils.workspace = true
world-chain-proof-succinct-host-utils.workspace = true
alloy-consensus = { workspace = true, features = ["serde"], optional = true }
bincode = { version = "1", optional = true }
serde_cbor = { version = "0.11", optional = true }
sha2 = { workspace = true, optional = true }
sp1-sdk = { version = "=6.2.3", features = ["network"], optional = true }

[target.'cfg(target_os = "linux")'.dependencies]
world-chain-proof-nitro = { workspace = true, optional = true }

[features]
default = []
nitro = ["dep:world-chain-proof-nitro", "world-chain-proof-nitro/aws_nitro"]
sp1 = [
    "dep:sp1-sdk",
    "dep:alloy-consensus",
    "dep:bincode",
    "dep:serde_cbor",
    "dep:sha2",
]
