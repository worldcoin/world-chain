[package]
name = "world-chain-prover-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "CLI tool that submits ad-hoc test proof requests to a running prover-service, computing pre/post-state output roots and L1 head automatically from live L1/L2 RPCs."

[[bin]]
name = "prover-cli"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
# workspace
world-chain-proofs.workspace = true
world-chain-prover-service.workspace = true
world-chain-proof-kona-host-utils.workspace = true

# alloy
alloy-primitives = { workspace = true, features = ["serde"] }

# misc
anyhow.workspace = true
clap.workspace = true
dotenvy.workspace = true
reqwest = { workspace = true, features = ["json", "rustls-tls"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time", "signal"] }
tracing.workspace = true
tracing-subscriber.workspace = true
