[package]
name = "world-chain-sp1-worker"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[[bin]]
name = "sp1-worker"
path = "src/main.rs"

[lints]
workspace = true

[features]
# Embed the SP1 guest ELFs at compile time via `sp1_sdk::include_elf!()`.
# Enabled by default for production binaries. Dependents that only need the
# library (e.g. devnet, which loads ELFs at runtime from env vars) can opt
# out with `default-features = false` to avoid triggering the SP1 build.
default = ["embedded-elfs"]
embedded-elfs = ["dep:world-chain-proof-succinct-elfs"]

[dependencies]
# workspace
world-chain-chainspec.workspace = true
world-chain-proof-core.workspace = true
world-chain-proof-kona-host-utils.workspace = true
world-chain-proof-protocol.workspace = true
world-chain-proof-succinct-elfs = { workspace = true, optional = true }
world-chain-proof-succinct-host-utils = { workspace = true, features = ["sp1"] }
world-chain-proof-succinct-utils.workspace = true
world-chain-proof-worker.workspace = true
world-chain-prover-service.workspace = true

# alloy
alloy-primitives = { workspace = true, features = ["serde"] }
alloy-sol-types.workspace = true

# misc
anyhow.workspace = true
clap.workspace = true
dotenvy.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "signal", "time"] }
tracing.workspace = true
tracing-subscriber.workspace = true

[dev-dependencies]
reqwest = { workspace = true, features = ["blocking", "json", "rustls-tls"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time"] }
world-chain-proofs.workspace = true
