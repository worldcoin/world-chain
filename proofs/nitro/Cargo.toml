[package]
name = "world-chain-proof-nitro"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "AWS Nitro TEE attestation prover for World Chain OP Succinct Lite fault proofs."

[lib]
path = "src/lib.rs"

# Binary that runs inside the Nitro Enclave. Only built when the `enclave-bin`
# feature is enabled because it depends on the full kona derivation stack and
# the NSM device interface that is only available inside the enclave runtime.
[[bin]]
name = "world-chain-nitro-enclave"
path = "src/enclave.rs"
required-features = ["enclave-bin"]

[[bin]]
name = "test-attestation"
path = "src/bin/test_attestation.rs"
required-features = ["aws_nitro"]

[features]
default = []
# Enables the host-side prover that talks to a running Nitro enclave over vsock.
# Requires Linux (AF_VSOCK is not available on macOS or Windows).
aws_nitro = ["dep:tokio-vsock", "dep:tracing-subscriber"]
# Enables the enclave-side code path. The actual `[[bin]]` target additionally
# requires the `enclave-bin` feature so it is only built for the enclave image.
enclave = [
    "dep:aws-nitro-enclaves-nsm-api",
    "dep:kona-proof",
    "dep:serde_bytes",
    "dep:tokio-vsock",
    "dep:world-chain-proof-kona-utils",
    "dep:world-chain-proof-succinct-ethereum-client-utils",
]
# Builds the actual enclave binary entry point. Implies `enclave`.
enclave-bin = ["enclave", "dep:tracing-subscriber"]

[dependencies]
# Shared (host + enclave) ----------------------------------------------------
alloy-primitives = { workspace = true, features = ["serde"] }
anyhow.workspace = true
base64 = { workspace = true }
ciborium = "0.2"
hex.workspace = true
rkyv.workspace = true
serde = { workspace = true, features = ["derive"] }
sha2.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["full"] }
tracing.workspace = true
world-chain-proof-core.workspace = true

# Host-side attestation verification deps (non-optional: used by parse_check_and_verify) --
# These are compiled on all platforms; the p384 / x509-parser crates are pure Rust and
# compile on macOS / Linux alike.
p384 = { version = "0.13", features = ["ecdsa", "pkcs8"] }
x509-parser = { version = "0.16", features = ["verify"] }
# secp256k1 signature verification used by the host-side prover to validate
# proof signatures returned by the enclave. Pure Rust — compiles on all
# platforms.
k256 = { version = "0.13", features = ["ecdsa"] }

# Linux-only host/enclave deps ----------------------------------------------
#
# Cargo features are target-independent, so `--all-features` on macOS still
# enables `aws_nitro`/`enclave`. Keeping the platform-specific crates in this
# target table prevents Cargo from trying to compile AF_VSOCK/NSM deps on
# non-Linux hosts.
[target.'cfg(target_os = "linux")'.dependencies]
tokio-vsock = { version = "0.5", optional = true }
aws-nitro-enclaves-nsm-api = { version = "0.4", optional = true }
kona-proof = { workspace = true, optional = true }
serde_bytes = { version = "0.11", optional = true }
world-chain-proof-kona-utils = { workspace = true, optional = true }
world-chain-proof-succinct-ethereum-client-utils = { workspace = true, optional = true }
# (k256 is in the top-level [dependencies] as a non-optional dep so it is
# available to both the enclave-side signing code and the host-side
# verification code in host.rs.)

# Feature-gated bin support -------------------------------------------------
tracing-subscriber = { workspace = true, optional = true }

[dev-dependencies]
serde_json = { workspace = true }
