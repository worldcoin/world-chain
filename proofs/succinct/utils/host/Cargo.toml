[package]
name = "world-chain-proof-succinct-host-utils"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
build = "build.rs"

[features]
# SP1 zkVM proving via the sp1-sdk environment provers.
sp1 = ["dep:sp1-sdk", "dep:bincode", "dep:alloy-sol-types"]

# Embed ELF binaries at compile time via `include_elf!()` / `include_bytes!()`,
# requiring the SP1 Docker build to have run first.  CI clippy/lint/test runs
# omit this feature so no Docker or SP1 toolchain is needed.  Production
# binaries (e.g. `world-chain-sp1-worker`) must enable it alongside `sp1`.
# See `build.rs` and `src/env_prover.rs`.
embedded-elfs = ["sp1"]

[build-dependencies]
# Used by `build.rs` to compile the SP1 guest programs when the `sp1`
# feature is on. Pinned to the same version as `sp1-sdk` / `sp1-zkvm` so the
# emitted `SP1_ELF_*` env vars match what `sp1_sdk::include_elf!()` expects.
sp1-build = "=6.1.0"

[dependencies]
alloy-primitives = { workspace = true, features = ["serde"] }
anyhow.workspace = true
reqwest = { workspace = true, features = ["blocking", "json", "rustls-tls"] }
rkyv.workspace = true
serde.workspace = true
serde_cbor = "0.11"
thiserror.workspace = true
serde_json.workspace = true
tokio.workspace = true
tracing.workspace = true
world-chain-proof-core.workspace = true
world-chain-proof-kona-host-utils.workspace = true
world-chain-proof-succinct-utils.workspace = true
alloy-sol-types = { workspace = true, optional = true }
bincode = { version = "1", optional = true }
sp1-sdk = { version = "=6.1.0", features = ["network"], optional = true }
