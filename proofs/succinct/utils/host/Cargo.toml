[package]
name = "world-chain-proof-succinct-host-utils"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[features]
# SP1 zkVM proving via the sp1-sdk environment provers.
sp1 = ["dep:sp1-sdk", "dep:bincode", "dep:alloy-sol-types"]

[dependencies]
alloy-consensus = { workspace = true, features = ["serde"] }
alloy-eips = { workspace = true, features = ["kzg"] }
alloy-primitives = { workspace = true, features = ["serde"] }
anyhow.workspace = true
async-trait.workspace = true
c-kzg.workspace = true
hex.workspace = true
kona-derive.workspace = true
kona-host = { workspace = true, features = ["single"] }
kona-preimage.workspace = true
kona-proof.workspace = true
kona-protocol.workspace = true
kzg-rs.workspace = true
reqwest = { workspace = true, features = ["blocking", "json", "rustls-tls"] }
rkyv.workspace = true
serde.workspace = true
serde_cbor = "0.11"
thiserror.workspace = true
serde_json.workspace = true
tokio.workspace = true
tracing.workspace = true
world-chain-proof-core.workspace = true
world-chain-proof-succinct-client-utils.workspace = true
world-chain-proof-succinct-ethereum-client-utils.workspace = true
world-chain-proof-succinct-utils.workspace = true
alloy-sol-types = { workspace = true, optional = true }
bincode = { version = "1", optional = true }
sp1-sdk = { version = "=6.1.0", features = ["network"], optional = true }
