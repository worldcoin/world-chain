[package]
name = "world-chain-proof-witness-gen"
version = "2.2.0"
edition = "2024"
license = "MIT"
homepage = "https://world.org/world-chain"
repository = "https://github.com/worldcoin/world-chain/"

[workspace]

[dependencies]
alloy-primitives = { version = "1.5.6", default-features = false, features = ["serde", "std"] }
clap = { version = "4", features = ["derive", "env"] }
color-eyre = "0.6"
dotenvy = "0.15"
hex = "0.4"
kona-host = { git = "https://github.com/ethereum-optimism/optimism", tag = "op-reth/v2.2.0", default-features = false, features = ["single"] }
kona-preimage = { git = "https://github.com/ethereum-optimism/optimism", tag = "op-reth/v2.2.0", features = ["rkyv", "serde"] }
kona-proof = { git = "https://github.com/ethereum-optimism/optimism", tag = "op-reth/v2.2.0" }
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
rkyv = { version = "0.8", features = ["hashbrown-0_15", "std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread"] }
world-chain-chainspec = { path = "../../../chainspec", default-features = false }
world-chain-proof-core = { path = "../../core", default-features = false }
world-chain-proof-protocol = { path = "../../protocol", default-features = false }
world-chain-proof-succinct-client-utils = { path = "../../succinct/utils/client", default-features = false }
world-chain-proof-succinct-ethereum-client-utils = { path = "../../succinct/utils/ethereum/client", default-features = false }
world-chain-proof-succinct-host-utils = { path = "../../succinct/utils/host", default-features = false }
world-chain-proof-nitro = { path = "../../nitro", default-features = false, features = ["aws_nitro"], optional = true }

[features]
default = []
nitro = ["dep:world-chain-proof-nitro"]
