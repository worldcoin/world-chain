[package]
name = "world-chain-proof-succinct-local-prover"
version = "2.2.0"
edition = "2024"
license = "MIT"
homepage = "https://world.org/world-chain"
repository = "https://github.com/worldcoin/world-chain/"

[workspace]

[dependencies]
alloy-primitives = { version = "1.5.6", default-features = false, features = ["serde", "std"] }
anyhow = "1.0.86"
clap = { version = "4", features = ["derive", "env"] }
dotenvy = "0.15.7"
color-eyre = "0.6"
hex = "0.4.3"
kona-host = { git = "https://github.com/ethereum-optimism/optimism", tag = "op-reth/v2.2.0", default-features = false, features = ["single"] }
kona-preimage = { git = "https://github.com/ethereum-optimism/optimism", tag = "op-reth/v2.2.0", features = ["rkyv", "serde"] }
kona-proof = { git = "https://github.com/ethereum-optimism/optimism", tag = "op-reth/v2.2.0" }
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
rkyv = { version = "0.8", features = ["hashbrown-0_15", "std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sp1-sdk = { version = "=6.1.0", features = ["blocking"], optional = true }
tokio = { version = "1.52.1", features = ["rt-multi-thread"] }
world-chain-chainspec = { path = "../../../../chainspec", default-features = false }
world-chain-proof-client = { path = "../../../client", default-features = false }
world-chain-proof-protocol = { path = "../../../protocol", default-features = false }
world-chain-proof-succinct-client-utils = { path = "../../utils/client", default-features = false }
world-chain-proof-succinct-ethereum-client-utils = { path = "../../utils/ethereum/client", default-features = false }
world-chain-proof-succinct-host-utils = { path = "../../utils/host", default-features = false }

[features]
default = []
sp1 = ["dep:sp1-sdk"]
