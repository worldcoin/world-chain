[package]
name = "world-chain-proof-succinct-client-utils"
version = "2.2.0"
edition = "2024"
rust-version = "1.95.0"
license = "MIT"
homepage = "https://world.org/world-chain"
repository = "https://github.com/worldcoin/world-chain/"

[dependencies]
alloy-consensus = { version = "2.0.0", default-features = false }
alloy-eips = { version = "2.0.0", default-features = false, features = ["serde"] }
alloy-primitives = { version = "1.5.6", default-features = false, features = [
    "std",
    "map-foldhash",
    "serde",
] }
alloy-rlp = { version = "0.3.13", default-features = false, features = ["derive"] }
alloy-sol-types = "1.5.6"
alloy-evm = { version = "0.33.0", default-features = false }
alloy-op-evm = { git = "https://github.com/ethereum-optimism/optimism", tag = "op-reth/v2.2.0", default-features = false }
anyhow = { version = "1.0.86", default-features = false }
async-trait = "0.1.88"
cfg-if = "1"
kona-derive = { git = "https://github.com/ethereum-optimism/optimism", tag = "op-reth/v2.2.0", default-features = false }
kona-driver = { git = "https://github.com/ethereum-optimism/optimism", tag = "op-reth/v2.2.0" }
kona-executor = { git = "https://github.com/ethereum-optimism/optimism", tag = "op-reth/v2.2.0" }
kona-genesis = { git = "https://github.com/ethereum-optimism/optimism", tag = "op-reth/v2.2.0", default-features = false }
kona-preimage = { git = "https://github.com/ethereum-optimism/optimism", tag = "op-reth/v2.2.0", features = [
    "rkyv",
    "serde",
] }
kona-proof = { git = "https://github.com/ethereum-optimism/optimism", tag = "op-reth/v2.2.0" }
kona-protocol = { git = "https://github.com/ethereum-optimism/optimism", tag = "op-reth/v2.2.0", default-features = false }
kzg-rs = { version = "0.2.8", features = ["rkyv", "serde"] }
op-alloy-consensus = { git = "https://github.com/ethereum-optimism/optimism", tag = "op-reth/v2.2.0", default-features = false }
op-revm = { git = "https://github.com/ethereum-optimism/optimism", tag = "op-reth/v2.2.0", default-features = false }
revm = { version = "38.0.0", default-features = false }
revm-precompile = { version = "34.0.0", default-features = false }
rkyv = { version = "0.8", features = ["hashbrown-0_15", "std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10.9"
spin = "0.10"
thiserror = "2"
tracing = "0.1"

[dev-dependencies]
serde_json = "1"
