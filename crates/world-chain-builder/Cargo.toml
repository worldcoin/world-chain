[package]
name = "world-chain-builder"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[features]
test-utils = [
    "alloy-genesis",
    "alloy-sol-types",
    "alloy-trie",
    "op-alloy-network",
    "lazy_static",
    "world-chain-p2p/test-utils",
