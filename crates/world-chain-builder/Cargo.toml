# Optional deps for test_utils (activated by `test-utils` / `bench` features,
# or implicitly by dev-dependencies when running `cargo test`).
alloy-genesis = { workspace = true, optional = true }
alloy-sol-types = { workspace = true, optional = true }
alloy-trie = { workspace = true, optional = true }
op-alloy-network = { workspace = true, optional = true }
lazy_static = { workspace = true, optional = true }

[dev-dependencies]
world-chain-builder = { path = ".", features = ["test-utils"] }
world-chain-test-utils.workspace = true
world-chain-p2p = { workspace = true, features = ["test-utils"] }
serde.workspace = true
serde_json.workspace = true
eyre.workspace = true
lazy_static.workspace = true
reth-tracing.workspace = true
tracing-subscriber.workspace = true
alloy-genesis.workspace = true
op-alloy-network.workspace = true
alloy-sol-types.workspace = true
alloy-trie.workspace = true
bon.workspace = true
