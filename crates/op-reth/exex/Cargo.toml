[package]
workspace = "../../.."
autotests = false
name = "world-chain-op-exex"
version = "1.11.3"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage = "https://paradigmxyz.github.io/reth"
repository = "https://github.com/paradigmxyz/reth"
description = "Execution extensions for OP-Reth"


[lib]
test = false

[lints]
workspace = true

[dependencies]
# reth
reth-exex.workspace = true
reth-execution-types.workspace = true
reth-node-api.workspace = true
reth-trie.workspace = true
reth-provider.workspace = true

# op-reth
# proofs exex handles `TrieUpdates` in notifications
reth-optimism-trie = { workspace = true, features = ["serde-bincode-compat"] }

# alloy
alloy-consensus.workspace = true
alloy-eips.workspace = true

# misc
eyre = "0.6.12"
futures-util.workspace = true
tracing.workspace = true
tokio.workspace = true

[features]
metrics = [
	"reth-optimism-trie/metrics",
	"reth-trie/metrics"
]
