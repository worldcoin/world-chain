[package]
name = "base-proof-succinct-validity"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[[bin]]
name = "validity"
path = "bin/validity.rs"

[dependencies]

# workspace
tokio.workspace = true
alloy-primitives.workspace = true

# tracing and telemetry
tracing.workspace = true


# local
base-proof-succinct-client-utils.workspace = true
base-proof-succinct-elfs.workspace = true
base-proof-succinct-host-utils.workspace = true
base-proof-succinct-proof-utils.workspace = true
base-proof-succinct-signer-utils.workspace = true

# sp1
sp1-sdk = { workspace = true, features = ["network", "blocking", "profiling"] }
sp1-cluster-utils.workspace = true

# alloy
alloy-eips.workspace = true
alloy-provider = { workspace = true }
alloy-signer-local.workspace = true
alloy-sol-types.workspace = true

anyhow.workspace = true
base-proof-contracts.workspace = true
dotenv.workspace = true
serde.workspace = true
serde_json.workspace = true
reqwest.workspace = true

# server
bincode.workspace = true
base64.workspace = true
serde_repr = "0.1.19"
sqlx = { version = "0.8.3", features = [
    "postgres",
    "chrono",
    "bigdecimal",
    "runtime-tokio",
    "tls-native-tls",
] }
chrono = "0.4.39"
futures-util = "0.3.31"
clap.workspace = true
tikv-jemallocator = "0.6.0"
rustls = "0.23.23"
strum = { workspace = true, features = ["derive"] }
strum_macros.workspace = true

[build-dependencies]
base-proof-succinct-build-utils.workspace = true

[dev-dependencies]
postgresql_embedded = { version = "0.20", features = ["bundled"] }

[lints]
workspace = true

