syntax = "proto3";

package prover;

service ProverService {
  rpc ProveBlock(ProveBlockRequest) returns (ProveBlockResponse);
  rpc GetProof(GetProofRequest) returns (GetProofResponse);
  rpc ListProofs(ListProofsRequest) returns (ListProofsResponse);
}

enum ProofType {
  PROOF_TYPE_UNSPECIFIED = 0;
  reserved 1, 2;
  PROOF_TYPE_COMPRESSED = 3;
  PROOF_TYPE_SNARK_GROTH16 = 4;
}

message ProveBlockRequest {
  // The start block number to prove from.
  uint64 start_block_number = 1;
  uint64 number_of_blocks_to_prove = 2;
  optional uint64 sequence_window = 3;
  // The type of proof to generate
  ProofType proof_type = 4;
  // Optional: client-provided UUID for idempotent requests.
  // If provided, a duplicate ID returns the existing session.
  // If omitted, the server generates a UUID.
  optional string session_id = 5;
  // Ethereum address of the on-chain prover (required for SNARK_GROTH16 proofs)
  optional string prover_address = 6;
  // Optional: explicit L1 head hash (hex-encoded B256) to use for witness generation.
  // When provided, bypasses SafeDB and sequence_window L1 head calculation.
  optional string l1_head = 7;
  optional uint64 intermediate_root_interval = 8;
}

message ProveBlockResponse {
  string session_id = 1;
}

enum ReceiptType {
  RECEIPT_TYPE_UNSPECIFIED = 0;
  RECEIPT_TYPE_STARK = 1;
  RECEIPT_TYPE_SNARK = 2;
  RECEIPT_TYPE_ON_CHAIN_SNARK = 3;
}

message GetProofRequest {
  string session_id = 1;
  // Optional: specify which receipt type to return (STARK, SNARK, or ON_CHAIN_SNARK)
  // If unspecified, returns STARK by default
  optional ReceiptType receipt_type = 2;
}

message GetProofResponse {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_CREATED = 1;
    STATUS_PENDING = 2;
    STATUS_RUNNING = 3;
    STATUS_SUCCEEDED = 4;
    STATUS_FAILED = 5;
  }

  Status status = 1;
  bytes receipt = 2; // the actual zk proof, only populated if status is SUCCEEDED
  optional string error_message = 3; // populated when status is STATUS_FAILED
  optional ExecutionStats execution_stats = 4; // populated by dry-run backends
}

message ExecutionStats {
  uint64 total_instruction_cycles = 1;
  uint64 total_sp1_gas = 2;
  map<string, uint64> cycle_tracker = 3;
  double witness_generation_ms = 4;
  double execution_ms = 5;
}

message ListProofsRequest {
  // Pagination offset (0-based).
  uint64 offset = 1;
  // Maximum number of results to return. Capped server-side.
  uint64 limit = 2;
  // Optional status filter. If unspecified or STATUS_UNSPECIFIED, returns all statuses.
  optional GetProofResponse.Status status_filter = 3;
}

// Summary of a proof request (excludes receipt bytes for efficiency).
message ProofSummary {
  string id = 1;
  uint64 start_block_number = 2;
  uint64 number_of_blocks_to_prove = 3;
  ProofType proof_type = 4;
  GetProofResponse.Status status = 5;
  string created_at = 6;
  string updated_at = 7;
  optional string completed_at = 8;
  optional string error_message = 9;
}

message ListProofsResponse {
  repeated ProofSummary proofs = 1;
  // Total number of proofs matching the filter (for pagination).
  uint64 total_count = 2;
}
