name: Docker Merge Manifest
description: Merge per-platform pushed digests into a multi-platform manifest and push tags.

inputs:
  registry:
    description: Docker registry host.
    required: true
  image_name:
    description: Full image name path (for example org/repo).
    required: true
  tags:
    description: Tag rules for docker/metadata-action (newline-separated).
    required: true
  digest_artifact_prefix:
    description: >-
      Prefix of the digest artifacts to merge (must match the
      digest_artifact_prefix given to docker-build-push-digest).
    required: false
    default: digests

outputs:
  digest:
    description: Digest of the pushed multi-platform manifest.
    value: ${{ steps.manifest-digest.outputs.digest }}

runs:
  using: composite
  steps:
    - name: Download digests
      uses: actions/download-artifact@v4
      with:
        path: ${{ runner.temp }}/digests
        pattern: ${{ inputs.digest_artifact_prefix }}-*
        merge-multiple: true

    - name: Log in to Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.registry }}/${{ inputs.image_name }}
        tags: ${{ inputs.tags }}

    - name: Create manifest list and push
      shell: bash
      working-directory: ${{ runner.temp }}/digests
      run: |
        docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
          $(printf '${{ inputs.registry }}/${{ inputs.image_name }}@sha256:%s ' *)

    - name: Inspect image
      shell: bash
      run: |
        docker buildx imagetools inspect ${{ inputs.registry }}/${{ inputs.image_name }}:${{ steps.meta.outputs.version }}

    - name: Export manifest digest
      id: manifest-digest
      shell: bash
      run: |
        digest=$(docker buildx imagetools inspect \
          '${{ inputs.registry }}/${{ inputs.image_name }}:${{ steps.meta.outputs.version }}' \
          --format '{{json .Manifest.Digest}}' | tr -d '"')
        echo "digest=${digest}" >> "$GITHUB_OUTPUT"
