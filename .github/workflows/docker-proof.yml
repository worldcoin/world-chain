name: docker-proof

# Image-only path for the prover deployables: builds and pushes the prover docker
# images to ghcr on merge to main (tag `nightly`) or via manual dispatch with a
# chosen `image_tag` (e.g. `alpha-v0.1.0`). It does NOT cut a release — versioned
# releases (manifest.json, signed binaries, EIF, vkeys) are cut by release-proof.yml
# on `proof/v*` tag pushes once the services are ready.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build.
        required: false
        default: main
      image_tag:
        description: Custom image tag to publish (e.g. "alpha-v0.1.0").
        required: false
        default: nightly
  push:
    branches: [main]

env:
  REPO_NAME: ${{ github.event.repository.name }}
  IMAGE_NAME: ${{ github.repository }}-proof
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  AWS_REGION: us-east-1
  SCCACHE_BUCKET: crypto-dev-us-east-1-workflow-build-cache

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-sp1-prover-image:
    name: build world-chain-prover-sp1 image
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: arc-public-8xlarge-amd64-runner
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - name: Build and push digest
        uses: ./.github/actions/docker-build-push-digest
        with:
          platform: ${{ matrix.platform }}
          registry: ${{ env.REGISTRY }}
          image_name: ${{ env.IMAGE_NAME }}-sp1
          aws_region: ${{ env.AWS_REGION }}
          sccache_bucket: ${{ env.SCCACHE_BUCKET }}
          dockerfile: Dockerfile.prover
          build_args: |
            PROVER_PACKAGE=world-chain-prover-sp1
            PROVER_BIN=world-chain-prover-sp1
            FEATURES=
          digest_artifact_prefix: digests-prover-sp1

  build-nitro-prover-image:
    name: build world-chain-prover-nitro image
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: arc-public-8xlarge-amd64-runner
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - name: Build and push digest
        uses: ./.github/actions/docker-build-push-digest
        with:
          platform: ${{ matrix.platform }}
          registry: ${{ env.REGISTRY }}
          image_name: ${{ env.IMAGE_NAME }}-nitro
          aws_region: ${{ env.AWS_REGION }}
          sccache_bucket: ${{ env.SCCACHE_BUCKET }}
          dockerfile: Dockerfile.prover
          build_args: |
            PROVER_PACKAGE=world-chain-prover-nitro
            PROVER_BIN=world-chain-prover-nitro
            FEATURES=
          digest_artifact_prefix: digests-prover-nitro

  # Each prover's merge depends ONLY on its own build jobs. docker-build-push-digest
  # pushes untagged (by-digest) manifests, which GHCR garbage-collects within minutes.
  # The nitro build has no build-elfs dependency and finishes ~13 min before sp1, so a
  # single merge gated on both builds let nitro's digests be collected before it ran
  # ("manifest ... not found"). Splitting mirrors release-proof.yml and keeps each merge
  # running right after its own builds.
  merge-sp1-prover-image:
    name: merge world-chain-prover-sp1 image manifest
    needs: [build-sp1-prover-image]
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - name: Merge multi-arch manifest
        uses: ./.github/actions/docker-merge-manifest
        with:
          registry: ${{ env.REGISTRY }}
          image_name: ${{ env.IMAGE_NAME }}-sp1
          digest_artifact_prefix: digests-prover-sp1
          tags: |
            type=raw,value=${{ inputs.image_tag || 'nightly' }}
            type=sha

  merge-nitro-prover-image:
    name: merge world-chain-prover-nitro image manifest
    needs: [build-nitro-prover-image]
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - name: Merge multi-arch manifest
        uses: ./.github/actions/docker-merge-manifest
        with:
          registry: ${{ env.REGISTRY }}
          image_name: ${{ env.IMAGE_NAME }}-nitro
          digest_artifact_prefix: digests-prover-nitro
          tags: |
            type=raw,value=${{ inputs.image_tag || 'nightly' }}
            type=sha

  # Service deployable images, built from the same Dockerfile.proof via
  # PROVER_PACKAGE/PROVER_BIN/FEATURES build-args. Each pushes to its own
  # `<repo>-<service>` image so tags do not collide with the `proof` image.
  build-service-images:
    name: build ${{ matrix.service.bin }} image
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        service:
          - { suffix: -sp1-worker, package: world-chain-sp1-worker, bin: sp1-worker, prefix: digests-sp1-worker }
          - { suffix: -proposer, package: world-chain-proposer, bin: world-chain-proposer, prefix: digests-proposer }
          - { suffix: -challenger, package: world-chain-challenger, bin: world-chain-challenger, prefix: digests-challenger }
          - { suffix: -defender, package: world-chain-defender, bin: world-chain-defender, prefix: digests-defender }
          - { suffix: -prover-service, package: world-chain-prover-service, bin: world-chain-prover-service, prefix: digests-prover-service }
        platform:
          - { runner: arc-public-8xlarge-amd64-runner, platform: linux/amd64 }
          - { runner: ubuntu-24.04-arm, platform: linux/arm64 }
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - name: Build and push digest
        uses: ./.github/actions/docker-build-push-digest
        with:
          platform: ${{ matrix.platform.platform }}
          registry: ${{ env.REGISTRY }}
          image_name: ${{ github.repository }}${{ matrix.service.suffix }}
          aws_region: ${{ env.AWS_REGION }}
          sccache_bucket: ${{ env.SCCACHE_BUCKET }}
          dockerfile: Dockerfile.prover
          build_args: |
            PROVER_PACKAGE=${{ matrix.service.package }}
            PROVER_BIN=${{ matrix.service.bin }}
          digest_artifact_prefix: ${{ matrix.service.prefix }}

  merge-service-images:
    name: merge ${{ matrix.service.bin }} image manifest
    needs: [build-service-images]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { suffix: -sp1-worker, prefix: digests-sp1-worker }
          - { suffix: -proposer, prefix: digests-proposer }
          - { suffix: -challenger, prefix: digests-challenger }
          - { suffix: -defender, prefix: digests-defender }
          - { suffix: -prover-service, prefix: digests-prover-service }
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - name: Merge multi-arch manifest
        uses: ./.github/actions/docker-merge-manifest
        with:
          registry: ${{ env.REGISTRY }}
          image_name: ${{ github.repository }}${{ matrix.service.suffix }}
          digest_artifact_prefix: ${{ matrix.service.prefix }}
          tags: |
            type=raw,value=${{ inputs.image_tag || 'nightly' }}
            type=sha

  # nitro-worker is Linux x86_64 only (requires AF_VSOCK), so it cannot be
  # built in the multi-arch service matrix above.
  build-nitro-worker-image:
    name: build nitro-worker image
    environment: dev
    runs-on: arc-public-8xlarge-amd64-runner
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - name: Build and push digest
        uses: ./.github/actions/docker-build-push-digest
        with:
          platform: linux/amd64
          registry: ${{ env.REGISTRY }}
          image_name: ${{ github.repository }}-nitro-worker
          aws_region: ${{ env.AWS_REGION }}
          sccache_bucket: ${{ env.SCCACHE_BUCKET }}
          dockerfile: Dockerfile.prover
          build_args: |
            PROVER_PACKAGE=world-chain-nitro-worker
            PROVER_BIN=nitro-worker
          digest_artifact_prefix: digests-nitro-worker

  merge-nitro-worker-image:
    name: merge nitro-worker image manifest
    needs: [build-nitro-worker-image]
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - name: Merge multi-arch manifest
        uses: ./.github/actions/docker-merge-manifest
        with:
          registry: ${{ env.REGISTRY }}
          image_name: ${{ github.repository }}-nitro-worker
          digest_artifact_prefix: digests-nitro-worker
          digest_artifact_pattern: digests-nitro-worker-linux-*
          tags: |
            type=raw,value=${{ inputs.image_tag || 'nightly' }}
            type=sha

  # nitro-worker-enclave uses its own Dockerfile (proofs/nitro/Dockerfile) and
  # is x86_64 only (Nitro Enclaves are x86_64).
  build-nitro-worker-enclave-image:
    name: build nitro-worker-enclave image
    environment: dev
    runs-on: arc-public-8xlarge-amd64-runner
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - name: Build and push digest
        uses: ./.github/actions/docker-build-push-digest
        with:
          platform: linux/amd64
          registry: ${{ env.REGISTRY }}
          image_name: ${{ github.repository }}-nitro-worker-enclave
          aws_region: ${{ env.AWS_REGION }}
          sccache_bucket: ${{ env.SCCACHE_BUCKET }}
          dockerfile: proofs/nitro/Dockerfile
          digest_artifact_prefix: digests-nitro-worker-enclave

  merge-nitro-worker-enclave-image:
    name: merge nitro-worker-enclave image manifest
    needs: [build-nitro-worker-enclave-image]
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - name: Merge multi-arch manifest
        uses: ./.github/actions/docker-merge-manifest
        with:
          registry: ${{ env.REGISTRY }}
          image_name: ${{ github.repository }}-nitro-worker-enclave
          digest_artifact_prefix: digests-nitro-worker-enclave
          tags: |
            type=raw,value=${{ inputs.image_tag || 'nightly' }}
            type=sha

  # Build the Nitro Enclave Image Format (EIF) file from the enclave Docker image,
  # then package it into a minimal OCI carrier image pushed to GHCR so Kubernetes
  # pods can pull it via an init container (AWS Nitro Enclaves K8s device plugin pattern).
  build-nitro-worker-enclave-eif-image:
    name: build nitro-worker-enclave EIF carrier image
    needs: [build-nitro-worker-enclave-image]
    runs-on: arc-public-8xlarge-amd64-runner
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build EIF
        run: scripts/build-eif.sh target/eif
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Get short SHA
        id: short-sha
        run: echo "value=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Build and push EIF carrier image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: proofs/nitro/Dockerfile.eif
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-nitro-worker-enclave-eif:${{ inputs.image_tag || 'nightly' }}
            ${{ env.REGISTRY }}/${{ github.repository }}-nitro-worker-enclave-eif:sha-${{ steps.short-sha.outputs.value }}
  summary:
    name: Image tags summary
    if: always()
    needs:
      - merge-sp1-prover-image
      - merge-nitro-prover-image
      - merge-nitro-worker-image
      - merge-nitro-worker-enclave-image
      - merge-nitro-worker-enclave-eif-image
      - merge-service-images
    runs-on: ubuntu-latest
    steps:
      - name: Write summary
        run: |
          TAG="${{ inputs.image_tag || 'nightly' }}"
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REPO="ghcr.io/${{ github.repository }}"
          {
            echo "## 🐳 Images built"
            echo ""
            echo "| Image | Tags |"
            echo "|-------|------|"
            echo "| \`$REPO-proof-sp1\` | \`${TAG}\`, \`sha-${SHA}\` |"
            echo "| \`$REPO-proof-nitro\` | \`${TAG}\`, \`sha-${SHA}\` |"
            echo "| \`$REPO-nitro-worker\` | \`${TAG}\`, \`sha-${SHA}\` |"
            echo "| \`$REPO-nitro-worker-enclave\` | \`${TAG}\`, \`sha-${SHA}\` |"
            echo "| \`$REPO-nitro-worker-enclave-eif\` | \`${TAG}\`, \`sha-${SHA}\` |"
            echo "| \`$REPO-sp1-worker\` | \`${TAG}\`, \`sha-${SHA}\` |"
            echo "| \`$REPO-proposer\` | \`${TAG}\`, \`sha-${SHA}\` |"
            echo "| \`$REPO-challenger\` | \`${TAG}\`, \`sha-${SHA}\` |"
            echo "| \`$REPO-defender\` | \`${TAG}\`, \`sha-${SHA}\` |"
            echo "| \`$REPO-prover-service\` | \`${TAG}\`, \`sha-${SHA}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
