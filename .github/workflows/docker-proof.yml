name: docker-proof

# Image-only path for the prover deployables: builds and pushes the prover docker
# images to ghcr on merge to main (tag `nightly`) or via manual dispatch with a
# chosen `image_tag` (e.g. `alpha-v0.1.0`). It does NOT cut a release — versioned
# releases (manifest.json, signed binaries, EIF, vkeys) are cut by release-proof.yml
# on `proof/v*` tag pushes once the services are ready.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build.
        required: false
        default: main
      image_tag:
        description: Custom image tag to publish (e.g. "alpha-v0.1.0").
        required: false
        default: nightly
  push:
    branches: [main]

env:
  REPO_NAME: ${{ github.event.repository.name }}
  IMAGE_NAME: ${{ github.repository }}-proof
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  AWS_REGION: us-east-1
  SCCACHE_BUCKET: crypto-dev-us-east-1-workflow-build-cache

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-elfs:
    name: build ELFs
    runs-on: arc-public-8xlarge-amd64-runner
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: taiki-e/install-action@just
      - name: Install SP1 toolchain
        run: |
          curl -L https://sp1.succinct.xyz | bash
          ~/.sp1/bin/sp1up --version v6.1.0
          echo "$HOME/.sp1/bin" >> $GITHUB_PATH
      - name: Build ELFs
        run: just build-proof-elfs
      - name: Upload ELFs
        uses: actions/upload-artifact@v4
        with:
          name: proof-elfs
          path: |
            proofs/succinct/elf/world-chain-range-ethereum
            proofs/succinct/elf/world-chain-aggregation
          if-no-files-found: error

  build-sp1-prover-image:
    name: build world-chain-prover-sp1 image
    environment: dev
    needs: [build-elfs]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: arc-public-8xlarge-amd64-runner
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - name: Download ELFs
        uses: actions/download-artifact@v4
        with:
          name: proof-elfs
          path: proofs/succinct/elf
      - name: Build and push digest
        uses: ./.github/actions/docker-build-push-digest
        with:
          platform: ${{ matrix.platform }}
          registry: ${{ env.REGISTRY }}
          image_name: ${{ env.IMAGE_NAME }}-sp1
          aws_region: ${{ env.AWS_REGION }}
          sccache_bucket: ${{ env.SCCACHE_BUCKET }}
          dockerfile: Dockerfile.prover
          build_args: |
            PROVER_BACKEND=sp1
          digest_artifact_prefix: digests-prover-sp1

  build-nitro-prover-image:
    name: build world-chain-prover-nitro image
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: arc-public-8xlarge-amd64-runner
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - name: Build and push digest
        uses: ./.github/actions/docker-build-push-digest
        with:
          platform: ${{ matrix.platform }}
          registry: ${{ env.REGISTRY }}
          image_name: ${{ env.IMAGE_NAME }}-nitro
          aws_region: ${{ env.AWS_REGION }}
          sccache_bucket: ${{ env.SCCACHE_BUCKET }}
          dockerfile: Dockerfile.prover
          build_args: |
            PROVER_BACKEND=nitro
          digest_artifact_prefix: digests-prover-nitro

  # Each prover's merge depends ONLY on its own build jobs. docker-build-push-digest
  # pushes untagged (by-digest) manifests, which GHCR garbage-collects within minutes.
  # The nitro build has no build-elfs dependency and finishes ~13 min before sp1, so a
  # single merge gated on both builds let nitro's digests be collected before it ran
  # ("manifest ... not found"). Splitting mirrors release-proof.yml and keeps each merge
  # running right after its own builds.
  merge-sp1-prover-image:
    name: merge world-chain-prover-sp1 image manifest
    needs: [build-sp1-prover-image]
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
      - name: Merge multi-arch manifest
        uses: ./.github/actions/docker-merge-manifest
        with:
          registry: ${{ env.REGISTRY }}
          image_name: ${{ env.IMAGE_NAME }}-sp1
          digest_artifact_prefix: digests-prover-sp1
          tags: |
            type=raw,value=${{ inputs.image_tag || 'nightly' }}
            type=sha

  merge-nitro-prover-image:
    name: merge world-chain-prover-nitro image manifest
    needs: [build-nitro-prover-image]
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
      - name: Merge multi-arch manifest
        uses: ./.github/actions/docker-merge-manifest
        with:
          registry: ${{ env.REGISTRY }}
          image_name: ${{ env.IMAGE_NAME }}-nitro
          digest_artifact_prefix: digests-prover-nitro
          tags: |
            type=raw,value=${{ inputs.image_tag || 'nightly' }}
            type=sha

  # Service deployable images, built from the same Dockerfile.proof via
  # PROVER_PACKAGE/PROVER_BIN/FEATURES build-args. Each pushes to its own
  # `<repo>-<service>` image so tags do not collide with the `proof` image.
  build-service-images:
    name: build ${{ matrix.service.bin }} image
    environment: dev
    needs: [build-elfs]
    strategy:
      fail-fast: false
      matrix:
        service:
          - { suffix: -sp1-worker, package: world-chain-sp1-worker, bin: sp1-worker, prefix: digests-sp1-worker }
          - { suffix: -proposer, package: world-chain-proposer, bin: world-chain-proposer, prefix: digests-proposer }
          - { suffix: -challenger, package: world-chain-challenger, bin: world-chain-challenger, prefix: digests-challenger }
          - { suffix: -defender, package: world-chain-defender, bin: world-chain-defender, prefix: digests-defender }
          - { suffix: -prover-service, package: world-chain-prover-service, bin: world-chain-prover-service, prefix: digests-prover-service }
        platform:
          - { runner: arc-public-8xlarge-amd64-runner, platform: linux/amd64 }
          - { runner: ubuntu-24.04-arm, platform: linux/arm64 }
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - name: Download ELFs
        if: matrix.service.bin == 'sp1-worker'
        uses: actions/download-artifact@v4
        with:
          name: proof-elfs
          path: proofs/succinct/elf
      - name: Build and push digest
        uses: ./.github/actions/docker-build-push-digest
        with:
          platform: ${{ matrix.platform.platform }}
          registry: ${{ env.REGISTRY }}
          image_name: ${{ github.repository }}${{ matrix.service.suffix }}
          aws_region: ${{ env.AWS_REGION }}
          sccache_bucket: ${{ env.SCCACHE_BUCKET }}
          dockerfile: Dockerfile.prover
          build_args: |
            PROVER_PACKAGE=${{ matrix.service.package }}
            PROVER_BIN=${{ matrix.service.bin }}
          digest_artifact_prefix: ${{ matrix.service.prefix }}

  merge-service-images:
    name: merge ${{ matrix.service.bin }} image manifest
    needs: [build-service-images]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { suffix: -sp1-worker, prefix: digests-sp1-worker }
          - { suffix: -proposer, prefix: digests-proposer }
          - { suffix: -challenger, prefix: digests-challenger }
          - { suffix: -defender, prefix: digests-defender }
          - { suffix: -prover-service, prefix: digests-prover-service }
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
      - name: Merge multi-arch manifest
        uses: ./.github/actions/docker-merge-manifest
        with:
          registry: ${{ env.REGISTRY }}
          image_name: ${{ github.repository }}${{ matrix.service.suffix }}
          digest_artifact_prefix: ${{ matrix.service.prefix }}
          tags: |
            type=raw,value=${{ inputs.image_tag || 'nightly' }}
            type=sha
