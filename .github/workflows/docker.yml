name: docker

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build. Leave blank to build the ref this run was launched from.
        required: false
        type: string
      image_tag:
        description: Mutable tag to publish alongside the immutable sha tag. "tag" applies the git tag (launch this run from a v* tag).
        required: true
        type: choice
        default: nightly
        options:
          - nightly
          - alphanet
          - tag
  push:
    branches: [main]

env:
  REPO_NAME: ${{ github.event.repository.name }}
  IMAGE_NAME: ${{ github.repository }}
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  AWS_REGION: us-east-1
  SCCACHE_BUCKET: crypto-dev-us-east-1-workflow-build-cache

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    name: build and push docker
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: arc-public-8xlarge-amd64-runner
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - name: Build and push digest
        uses: ./.github/actions/docker-build-push-digest
        with:
          platform: ${{ matrix.platform }}
          registry: ${{ env.REGISTRY }}
          image_name: ${{ env.IMAGE_NAME }}
          aws_region: ${{ env.AWS_REGION }}
          sccache_bucket: ${{ env.SCCACHE_BUCKET }}

  merge:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
      - name: Merge multi-arch manifest
        uses: ./.github/actions/docker-merge-manifest
        with:
          registry: ${{ env.REGISTRY }}
          image_name: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=nightly,enable=${{ inputs.image_tag == 'nightly' }}
            type=raw,value=alphanet,enable=${{ inputs.image_tag == 'alphanet' }}
            type=ref,event=tag,enable=${{ inputs.image_tag == 'tag' }}
