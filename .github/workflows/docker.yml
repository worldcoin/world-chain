name: docker

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  REPO_NAME: ${{ github.event.repository.name }}
  IMAGE_NAME: ${{ github.repository }}
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  AWS_REGION: us-east-1
  SCCACHE_BUCKET: crypto-dev-us-east-1-workflow-build-cache

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    name: build and push docker
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: arc-public-8xlarge-amd64-runner
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
      - name: Build and push digest
        uses: ./.github/actions/docker-build-push-digest
        with:
          platform: ${{ matrix.platform }}
          registry: ${{ env.REGISTRY }}
          image_name: ${{ env.IMAGE_NAME }}
          aws_region: ${{ env.AWS_REGION }}
          sccache_bucket: ${{ env.SCCACHE_BUCKET }}

  merge:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6
      - name: Merge multi-arch manifest
        uses: ./.github/actions/docker-merge-manifest
        with:
          registry: ${{ env.REGISTRY }}
          image_name: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=nightly
            type=sha

  dispatch-devnet-bump:
    name: dispatch devnet bump to crypto-apps
    needs: merge
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.DEVNET_DEPLOYMENT_APPID }}
          private-key: ${{ secrets.DEVNET_DEPLOYMENT_SECRET }}
          owner: worldcoin
          repositories: crypto-apps

      - name: Send repository_dispatch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          SHORT=${SHA::7}
          gh api repos/worldcoin/crypto-apps/dispatches \
            -f event_type=bump-world-chain-dev \
            -f "client_payload[tag]=sha-${SHORT}" \
            -f "client_payload[sha]=${SHA}" \
            -f "client_payload[issuer]=${RUN_URL}"
          echo "Dispatched bump-world-chain-dev with tag sha-${SHORT}"
