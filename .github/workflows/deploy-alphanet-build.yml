name: deploy-alphanet-build

# Build + push a world-chain image for a pinned commit and dispatch an alphanet tag bump to
# worldcoin/crypto-apps. Triggered (workflow_dispatch) by deploy-alphanet.yml after it has
# authorized the commenter and resolved the PR head. It receives an immutable `sha` input, so
# there is no time-of-check/time-of-use window.
#
# Run this only via the /deploy-alphanet command (or a manual dispatch by a maintainer with
# a known-good SHA). The heavy lifting lives in the reusable docker-build-deploy.yml workflow.

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to build (immutable, 40-char)."
        required: true
        type: string
      pr:
        description: "PR number to comment the result on (optional)."
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  pull-requests: write

jobs:
  build-deploy:
    name: build and deploy alphanet
    uses: ./.github/workflows/docker-build-deploy.yml
    with:
      ref: ${{ inputs.sha }}
      dispatch_event_type: bump-world-chain-alphanet
      pr: ${{ inputs.pr }}
    secrets: inherit
