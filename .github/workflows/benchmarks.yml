name: Benchmark Regression Check

on:
  pull_request:
    paths:
      - 'crates/**'
      - '.github/workflows/benchmarks.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    runs-on: arc-public-8xlarge-amd64-runner
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v5
        continue-on-error: false
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-bench-

      - name: Install critcmp
        run: cargo install critcmp --locked

      # Benchmark the base revision and the PR revision in the same job so
      # both measurements run on the same machine under similar conditions.
      - name: Run base benchmarks
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git checkout --detach "$BASE_SHA"
          cargo bs base

      - name: Run PR benchmarks
        if: github.event_name == 'pull_request'
        env:
          PR_SHA: ${{ github.sha }}
        run: |
          git checkout --detach "$PR_SHA"
          cargo bs pr

      - name: Run benchmarks
        if: github.event_name == 'workflow_dispatch'
        run: cargo b

      # Compare against main baseline if available
      - name: Check for regressions
        if: github.event_name == 'pull_request'
        run: |
          echo "=== Full Benchmark Comparison ==="
          critcmp base pr

          echo ""
          echo "=== Checking for >10% regressions ==="
          filtered=$(critcmp base pr --threshold 10 2>&1 || true)

          # critcmp always exits 0 - we must parse output to detect regressions.
          # In the output, the FASTER baseline gets ratio 1.00.
          # If 'base' shows 1.00 in a data row, 'pr' is slower (regression).
          # Data rows start after the header (line 1) and separator (line 2).
          regressions=$(echo "$filtered" | awk 'NR > 2 && NF > 0' | grep -E '^\S+\s+1\.00\s' || true)

          if [ -n "$regressions" ]; then
            echo ""
            echo "Regressions detected (>10% slower than base):"
            echo "$filtered"
            echo ""
            echo "::error::Performance regression detected - pr is >10% slower than the base branch in the same workflow run"
            exit 1
          fi

          echo "No significant regressions detected."

      # Post results as PR comment
      - name: Post benchmark comparison
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            try {
              const output = execSync('critcmp base pr --color never', { encoding: 'utf-8' });
              const body = `## Benchmark Results\n\nCompared on the same runner in the same workflow run.\n\n\`\`\`\n${output}\n\`\`\`\n\n> Threshold: 10% regression triggers failure`;
              // Check for existing comment to update
              const { data: comments } = await github.rest.issues.listComments({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              const existing = comments.find(c => c.body.startsWith('## Benchmark Results'));
              if (existing) {
                await github.rest.issues.updateComment({
                  comment_id: existing.id,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body,
                });
              }
            } catch (e) {
              console.log('Could not post benchmark comment:', e.message);
            }
