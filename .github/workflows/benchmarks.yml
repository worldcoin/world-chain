name: Benchmark Regression Check

on:
  pull_request:
    # Only run when core execution crates change. These crates host the
    # benchmarked code paths (flashblock validation / payload building).
    paths:
      - 'crates/payload/**'
      - 'crates/validator/**'
      - 'crates/builder/**'
      - '.github/workflows/benchmarks.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  BENCH_NAME: flashblock_validation_synthetic

jobs:
  benchmark:
    runs-on: arc-public-8xlarge-amd64-runner
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v5
        continue-on-error: false
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-bench-

      - name: Install critcmp
        run: cargo install critcmp --locked

      # Benchmark the base revision and the PR revision in the same job so
      # both measurements run on the same machine under similar conditions.
      - name: Run base benchmarks
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git checkout --detach "$BASE_SHA"
          if [ -f "crates/validator/benches/${BENCH_NAME}.rs" ]; then
            BENCH_PACKAGE=world-chain-validator
          elif [ -f "crates/builder/benches/${BENCH_NAME}.rs" ]; then
            BENCH_PACKAGE=world-chain-builder
          else
            echo "::error::Could not find ${BENCH_NAME} benchmark"
            exit 1
          fi
          echo "Running ${BENCH_NAME} from ${BENCH_PACKAGE}"
          cargo bench --package "$BENCH_PACKAGE" --bench "$BENCH_NAME" -- --save-baseline base

      - name: Run PR benchmarks
        if: github.event_name == 'pull_request'
        env:
          PR_SHA: ${{ github.sha }}
        run: |
          git checkout --detach "$PR_SHA"
          if [ -f "crates/validator/benches/${BENCH_NAME}.rs" ]; then
            BENCH_PACKAGE=world-chain-validator
          elif [ -f "crates/builder/benches/${BENCH_NAME}.rs" ]; then
            BENCH_PACKAGE=world-chain-builder
          else
            echo "::error::Could not find ${BENCH_NAME} benchmark"
            exit 1
          fi
          echo "Running ${BENCH_NAME} from ${BENCH_PACKAGE}"
          cargo bench --package "$BENCH_PACKAGE" --bench "$BENCH_NAME" -- --save-baseline pr

      - name: Run benchmarks
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ -f "crates/validator/benches/${BENCH_NAME}.rs" ]; then
            BENCH_PACKAGE=world-chain-validator
          elif [ -f "crates/builder/benches/${BENCH_NAME}.rs" ]; then
            BENCH_PACKAGE=world-chain-builder
          else
            echo "::error::Could not find ${BENCH_NAME} benchmark"
            exit 1
          fi
          echo "Running ${BENCH_NAME} from ${BENCH_PACKAGE}"
          cargo bench --package "$BENCH_PACKAGE" --bench "$BENCH_NAME"

      # Compare against main baseline if available
      - name: Check for regressions
        if: github.event_name == 'pull_request'
        run: |
          echo "=== Full Benchmark Comparison ==="
          critcmp base pr

          echo ""
          echo "=== Checking for >10% regressions ==="
          filtered=$(critcmp base pr --threshold 10 2>&1 || true)

          # critcmp always exits 0 - we must parse output to detect regressions.
          # In the output, the FASTER baseline gets ratio 1.00.
          # If 'base' shows 1.00 in a data row, 'pr' is slower (regression).
          # Data rows start after the header (line 1) and separator (line 2).
          regressions=$(echo "$filtered" | awk 'NR > 2 && NF > 0' | grep -E '^\S+\s+1\.00\s' || true)

          if [ -n "$regressions" ]; then
            echo ""
            echo "Regressions detected (>10% slower than base):"
            echo "$filtered"
            echo ""
            echo "::error::Performance regression detected - pr is >10% slower than the base branch in the same workflow run"
            exit 1
          fi

          echo "No significant regressions detected."

      # Post results as PR comment
      - name: Post benchmark comparison
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          THRESHOLD: '10'
        with:
          script: |
            const { execSync } = require('child_process');
            const threshold = Number(process.env.THRESHOLD);

            // Parse critcmp's column output into structured rows. Each data row
            // holds a benchmark name followed by, per baseline, a ratio (the
            // fastest baseline is 1.00) and an estimate token containing "±".
            // We anchor on the "±" tokens so any optional throughput columns
            // are skipped reliably.
            function parse(output) {
              const rows = [];
              for (const line of output.split('\n')) {
                const tokens = line.trim().split(/\s+/).filter(Boolean);
                const timeIdx = tokens.flatMap((t, i) => (t.includes('±') ? [i] : []));
                if (timeIdx.length !== 2) continue; // header/separator/blank
                const [bi, pi] = timeIdx;
                const name = tokens.slice(0, bi - 1).join(' ');
                if (!name) continue;
                rows.push({
                  name,
                  baseRatio: Number(tokens[bi - 1]),
                  baseTime: tokens[bi],
                  prRatio: Number(tokens[pi - 1]),
                  prTime: tokens[pi],
                });
              }
              return rows;
            }

            function render(rows) {
              const header =
                '| Benchmark | Base | PR | Change |\n| --- | --- | --- | --- |';
              const lines = rows.map((r) => {
                // Ratios are relative to the fastest baseline; PR vs base delta.
                const pct =
                  Number.isFinite(r.baseRatio) && r.baseRatio > 0
                    ? (r.prRatio / r.baseRatio - 1) * 100
                    : NaN;
                let change = 'n/a';
                if (Number.isFinite(pct)) {
                  const sign = pct >= 0 ? '+' : '';
                  let icon = '🟢'; // faster
                  if (pct > threshold) icon = '🔴';
                  else if (pct > 0) icon = '🟡';
                  change = `${icon} ${sign}${pct.toFixed(2)}%`;
                }
                return `| \`${r.name}\` | ${r.baseTime} | ${r.prTime} | ${change} |`;
              });
              return [header, ...lines].join('\n');
            }

            try {
              const output = execSync('critcmp base pr --color never', {
                encoding: 'utf-8',
              });
              const rows = parse(output);
              const table = rows.length
                ? render(rows)
                : '_Could not parse benchmark output; see raw results below._';

              const body = [
                '## Benchmark Results',
                '',
                'Base and PR measured on the same runner in the same workflow run.',
                '',
                table,
                '',
                `> 🔴 regression > ${threshold}% &nbsp;·&nbsp; 🟡 slower &nbsp;·&nbsp; 🟢 faster. A regression > ${threshold}% fails the check.`,
                '',
                '<details><summary>Raw <code>critcmp</code> output</summary>',
                '',
                '```',
                output.trimEnd(),
                '```',
                '',
                '</details>',
              ].join('\n');

              // Check for existing comment to update
              const { data: comments } = await github.rest.issues.listComments({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              const existing = comments.find((c) =>
                c.body.startsWith('## Benchmark Results')
              );
              if (existing) {
                await github.rest.issues.updateComment({
                  comment_id: existing.id,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body,
                });
              }
            } catch (e) {
              console.log('Could not post benchmark comment:', e.message);
            }
