# Alphanet manifest.
#
# The deployed alphanet commits to exactly the functionality declared here. The
# node is launched with `--chain manifests/alphanet.toml` (deriving its chain
# spec) and the harness is run with `--manifest manifests/alphanet.toml`, so the
# deployment and its acceptance criteria can never drift apart.
name = "alphanet"

# The single committed hardfork (cumulative: jovian + every earlier fork).
hardfork = "jovian"

# Arbitrary set of committed features.
features = ["flashblocks", "block_access_list", "pbh"]

[chain]
# Canonical chain source. Use a named spec, or commit to a genesis file with
# `genesis = "alphanet.genesis.json"` for full control over the schedule
# (required to commit to World-specific forks like tropo that named specs omit).
spec = "dev"
# TODO(alphanet): set the real alphanet chain id once the chain is provisioned.
# chain_id = 0
