# Alphanet manifest.
#
# The deployed alphanet commits to exactly the hardfork and feature slices
# declared here.
name = "alphanet"

# Required World Chain hardfork. Hardfork slices at or before this fork run.
hardfork = "jovian"

# Optional unique feature list.
features = ["flashblocks", "block_access_list", "pbh"]

[chain]
# Canonical chain source. Use exactly one of `spec` or `genesis`.
spec = "dev"
# TODO(alphanet): set the real alphanet chain id once the chain is provisioned.
# chain_id = 0
