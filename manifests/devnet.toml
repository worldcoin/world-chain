# Local devnet manifest.
#
# Single source of truth for the in-process devnet and its acceptance criteria.
name = "devnet"

# Required World Chain hardfork. Hardfork slices at or before this fork run.
hardfork = "jovian"

# Optional unique feature list. The native in-process devnet does not deploy PBH
# contracts, so PBH is omitted.
features = ["flashblocks"]

[chain]
# Canonical predefined spec; the committed hardfork must be one it schedules.
spec = "dev"
chain_id = 2151908
