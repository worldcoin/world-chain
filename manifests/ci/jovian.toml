# CI fork-compatibility manifest — Jovian.
#
# Used by `.github/workflows/devnet-acceptance.yml`: the harness spawns an
# in-process devnet derived from this manifest (`--target spawned`) and holds it
# to exactly the forks and features committed here. Jovian is the live World
# Chain hardfork, so this is the gating cell of the fork-compatibility matrix.
name = "ci-jovian"

# Committed hardfork (cumulative: Jovian + every earlier OP fork). The spawned
# devnet activates all of these at genesis.
hardfork = "jovian"

# Current World Chain features. `block_access_list` implies `flashblocks`.
features = ["flashblocks", "block_access_list"]

[chain]
# The built-in OP dev spec schedules every fork through Jovian, so no genesis
# file is needed here.
spec = "dev"
chain_id = 2151908
